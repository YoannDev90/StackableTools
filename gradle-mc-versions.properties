# Multi-version dependency reference
# Usage: ./gradlew build -PmcVersion=<version> -Pminecraft_version=<mc_ver> ...
#
# 1.21.x defaults (from gradle.properties):
#   mcVersion=1.21.4, minecraft_version=1.21.4, yarn_mappings=1.21.4+build.8, fabric_api_version=0.117.0+1.21.4

# To build for 1.21.0-1.21.3:
# ./gradlew build -PmcVersion=1.21.0-1.21.3 -Pminecraft_version=1.21 -Pyarn_mappings=1.21+build.1 -Pfabric_api_version=0.98.0+1.21
