# Automatically build the project and run any configured tests for every push
# and submitted pull request. This can help catch issues that only occur on
# certain platforms or Java versions, and provides a first line of defence
# against bad commits.

name: build-and-release
on:
  pull_request:
  push:
  workflow_dispatch:
    inputs:
      release-title:
        description: 'Title for the release (defaults to "Release vX.Y.Z")'
        type: string
        required: false
      release-body:
        description: 'Body for the release (defaults to "Release vX.Y.Z")'
        type: string
        required: false
      release-tag:
        description: 'Tag for the release (defaults to "vX.Y.Z")'
        type: string
        required: false
      publish-curseforge-modrinth:
        description: 'Whether to publish the release on CurseForge and Modrinth (defaults to false)'
        type: boolean
        required: false
permissions:
  contents: write
  packages: write
  id-token: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v4
      - name: Setup jdk
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'microsoft'
      - name: Make gradle wrapper executable
        run: chmod +x ./gradlew
      - name: Build
        run: ./gradlew build
      - name: Capture build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Artifacts
          path: build/libs/
          
  release:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'microsoft'

      - name: Make gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew build

      - name: Verify artifacts exist
        run: |
          echo "Listing build/libs contents:"
          ls -R build/libs/
          if ! ls build/libs/*.jar 1> /dev/null 2>&1; then
            echo "::error::No artifacts found in build/libs/. Failing the step."
            exit 1
          fi

      - name: Get version
        id: get_version
        run: |
          VERSION=$(grep "mod_version" gradle.properties | cut -d'=' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: check_tag
        run: |
          git fetch --tags
          if git rev-parse "v${{ steps.get_version.outputs.version }}" >/dev/null 2>&1; then
            echo "tag_exists=true" >> $GITHUB_OUTPUT
            echo "Tag v${{ steps.get_version.outputs.version }} already exists. Skipping tag creation and push."
          else
            echo "tag_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create tag if needed
        if: steps.check_tag.outputs.tag_exists == 'false'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag v${{ steps.get_version.outputs.version }}
          git push origin v${{ steps.get_version.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: Release v${{ steps.get_version.outputs.version }}
          body: ${{ github.event.inputs.release-body || format('Release v%s', steps.get_version.outputs.version) }}
          draft: false
          prerelease: false
          make_latest: true
          files: build/libs/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to CurseForge + Modrinth
        uses: tristankechlo/publish-mc-mod@v2.0.0
        if: ${{ github.event.inputs.publish-curseforge-modrinth == 'true' }}
        with:
          mc-version: '1.20.4'
          mod-version: ${{ steps.get_version.outputs.version }}
          curseforge-id: ${{ secrets.CURSEFORGE_PROJECT_ID }}
          modrinth-id: ${{ secrets.MODRINTH_PROJECT_ID }}
          version-range: '[1.20.4,1.21)'
          version-type: 'release'
          loaders: 'fabric'
          files: 'build/libs/!(*-dev.jar|*-sources.jar|*-javadoc.jar|*-all.jar)'
          curseforge-files: 'build/libs/!(*-dev.jar|*-sources.jar|*-javadoc.jar|*-all.jar)'
          modrinth-files: 'build/libs/!(*-dev.jar|*-sources.jar|*-javadoc.jar|*-all.jar)'
          changelog: ${{ github.event.inputs.release-body || 'Automated release from GitHub Actions.' }}
          curseforge-token: ${{ secrets.CURSEFORGE_API_KEY }}
          modrinth-token: ${{ secrets.MODRINTH_API_TOKEN }}

